; ===========================================================================
; Telltale e-mail configuration  --  results publishing (OPTIONAL)
; ===========================================================================
; This file controls the optional results e-mail. Until the [smtp] section is
; uncommented and filled in, Telltale will NOT send e-mail: "Publish" still
; writes the PNG/PDF to outputs/ and just prints a notice that e-mail is off.
; Nothing here can crash a save or a publish.
;
; The recipients are a LIST: set "email_recipients" in Settings (CLI or web) to
; a comma-separated list and every address receives the results, e.g.
;     results@example.org, commodore@example.org, fleet@example.org
; (semicolons work too). The "From" address is "from_addr" below.
;
; ---------------------------------------------------------------------------
; SETTING UP A SENDING MAILBOX
; ---------------------------------------------------------------------------
; Create (or reuse) a mailbox with your e-mail provider and read its outgoing
; (SMTP) settings. Most providers list these under "Configure Mail Client",
; "Device & App Setup", or similar. You will need:
;
;     Outgoing (SMTP) server :  e.g. mail.example.org  or  smtp.gmail.com
;     SMTP port (SSL/TLS)    :  465        with use_ssl = true
;     SMTP port (STARTTLS)   :  587        with use_tls = true
;     Username               :  usually the full e-mail address
;     Password               :  the mailbox password or an app password
;
; NOTE for Gmail / Google Workspace and many others: you must create an
; "app password" (with 2-Step Verification enabled) rather than using your
; normal account password. Never commit a real password to a public repo.
;
; Then uncomment the [smtp] block below and fill it in. In Telltale:
; Settings -> set email_recipients to your distribution list, then Publish a
; race. The status line reads "sent to ..." on success, or "send failed" if
; the password is wrong or the port/mode mismatch (465 = use_ssl, 587 = use_tls).
; ===========================================================================

; --- Uncomment and fill in to enable e-mail (recommended: SSL on 465). ------
; [smtp]
; host      = mail.example.org
; port      = 465
; use_ssl   = true
; use_tls   = false
; username  = results@example.org
; password  = CHANGE_ME
; from_addr = results@example.org

; --- STARTTLS alternative (port 587): swap use_ssl/use_tls and the port ------
;   port      = 587
;   use_ssl   = false
;   use_tls   = true
